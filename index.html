<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4a6cf7">
    <meta name="description" content="EgeLingo - подготовка к ЕГЭ">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="111.png">
    <link rel="apple-touch-icon" href="111.png">
    <title>EgeLingo - ЕГЭ Тренажёр</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Экран авторизации -->
        <div class="auth-screen" id="authScreen">
            <div class="auth-card">
                <div class="auth-logo">
                    <img src="111.png" alt="EgeLingo" class="logo-img">
                    <span>EgeLingo</span>
                </div>
                <h1>Готовься к ЕГЭ<br>с удовольствием</h1>
                <p>Интерактивные задания с сайта «Решу ЕГЭ»</p>
                
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Вход</button>
                    <button class="auth-tab" data-tab="register">Регистрация</button>
                </div>
                
                <div class="auth-form" id="loginForm">
                    <input type="text" id="loginUsername" placeholder="Имя пользователя" class="auth-input">
                    <input type="password" id="loginPassword" placeholder="Пароль" class="auth-input">
                    <button class="auth-submit-btn" id="loginBtn">Войти</button>
                </div>
                
                <div class="auth-form" id="registerForm" style="display: none;">
                    <input type="text" id="registerUsername" placeholder="Имя пользователя" class="auth-input">
                    <input type="password" id="registerPassword" placeholder="Пароль (мин. 4 символа)" class="auth-input">
                    <button class="auth-submit-btn" id="registerBtn">Зарегистрироваться</button>
                </div>
                
                <div class="auth-footer">
                    <span>🎓 21+ заданий</span>
                    <span>⭐ Система уровней</span>
                    <span>🏆 Достижения</span>
                </div>
            </div>
        </div>

        <!-- Основное приложение -->
        <div class="main-app" id="mainApp" style="display: none;">
            <header class="header">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <span class="username" id="username">Ученик</span>
                </div>
                <div class="level-container">
                    <div class="level-badge" id="levelBadge">📊 Уровень 1</div>
                    <div class="xp-bar-wrapper">
                        <div class="xp-bar">
                            <div class="xp-fill" id="xpFill"></div>
                        </div>
                        <span class="xp-text" id="xpText">0 / 100 XP</span>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn" title="Выйти">🚪</button>
            </header>

            <!-- Статистика -->
            <div class="stats-bar" id="statsBar" style="display: none;">
                <div class="stat-card">
                    <span class="stat-value" id="totalTasks">0</span>
                    <span class="stat-label">решено</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="correctPercent">0%</span>
                    <span class="stat-label">верных</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="streak">0</span>
                    <span class="stat-label">серия 🔥</span>
                </div>
            </div>

            <!-- Выбор предмета -->
            <div class="subject-selector">
                <button class="subject-btn active" data-subject="math">📐 Математика</button>
                <button class="subject-btn" data-subject="russian">📖 Русский язык</button>
                <button class="subject-btn" data-subject="physics">⚡ Физика</button>
                <button class="subject-btn" data-subject="informatics">💻 Информатика</button>
            </div>

            <main class="main-content">
                <div class="task-selector">
                    <h2 id="subjectTitle">📌 Выбери задание ЕГЭ</h2>
                    <div class="tasks-grid" id="tasksGrid"></div>
                </div>

                <div class="task-card" id="taskCard" style="display: none;">
                    <div class="task-header">
                        <h3 id="taskTitle">Задание 1</h3>
                        <button class="close-task" id="closeTaskBtn">✕</button>
                    </div>
                    <div class="task-content">
                        <p class="task-text" id="taskText">Загрузка...</p>
                        <div class="task-input-area">
                            <input type="text" id="taskAnswer" placeholder="Введите ответ" class="task-input">
                            <button class="check-btn" id="checkBtn">Проверить</button>
                        </div>
                        <div class="task-feedback" id="taskFeedback"></div>
                        <div class="task-solution" id="taskSolution" style="display: none;">
                            <strong>📖 Решение:</strong>
                            <p id="solutionText"></p>
                        </div>
                    </div>
                </div>
            </main>

            <!-- Достижения -->
            <div class="achievements-panel" id="achievementsPanel">
                <h3>🏆 Достижения</h3>
                <div class="achievements-grid" id="achievementsGrid"></div>
            </div>

            <div class="owl-avatar" id="owlAvatar">
                <div class="owl-icon">🦉</div>
                <div class="owl-tooltip" id="owlTooltip">Выбери предмет и задание!</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
