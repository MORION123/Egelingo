<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4a6cf7">
    <meta name="description" content="EgeLingo - подготовка к ЕГЭ по математике">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="111.png">
    <link rel="apple-touch-icon" href="111.png">

    <title>EgeLingo</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <div class="auth-logo">
            <img src="111.png" class="logo-img">
            <span>EgeLingo</span>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Вход</button>
            <button class="auth-tab" data-tab="register">Регистрация</button>
        </div>

        <div id="loginForm" class="auth-form">
            <input id="loginUsername" class="auth-input" placeholder="Логин">
            <input id="loginPassword" class="auth-input" type="password" placeholder="Пароль">
            <button id="loginBtn" class="auth-submit-btn">Войти</button>
        </div>

        <div id="registerForm" class="auth-form" style="display:none;">
            <input id="registerUsername" class="auth-input" placeholder="Логин">
            <input id="registerPassword" class="auth-input" type="password" placeholder="Пароль">
            <button id="registerBtn" class="auth-submit-btn">Создать аккаунт</button>
        </div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="app-container">

        <div class="header">
            <div class="user-info">
                <span id="userAvatar">👤</span>
                <span id="username"></span>
            </div>

            <div class="level-container">
                <div id="levelBadge">Уровень 1</div>
                <div class="xp-bar">
                    <div id="xpFill" class="xp-fill"></div>
                </div>
                <div id="xpText"></div>
            </div>

            <button id="logoutBtn">🚪</button>
        </div>

        <div class="main-content">
            <div class="task-selector">
                <h2>Выбери задание</h2>
                <div id="tasksGrid" class="tasks-grid"></div>
            </div>

            <div id="taskCard" class="task-card" style="display:none;">
                <div class="task-header">
                    <h3 id="taskTitle"></h3>
                    <button id="closeTaskBtn">✖</button>
                </div>

                <div id="taskText" class="task-text"></div>

                <div class="task-input-area">
                    <input id="taskAnswer" class="task-input" placeholder="Ответ">
                    <button id="checkBtn" class="check-btn">Проверить</button>
                </div>

                <div id="taskFeedback" class="task-feedback"></div>

                <div id="taskSolution" class="task-solution" style="display:none;">
                    <strong>Решение:</strong>
                    <div id="solutionText"></div>
                </div>
            </div>
        </div>

        <div id="owlAvatar" class="owl-avatar">
            <div class="owl-icon">🦉</div>
            <div id="owlTooltip" class="owl-tooltip"></div>
        </div>

    </div>
</div>

<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}
</script>

</body>
</html>
